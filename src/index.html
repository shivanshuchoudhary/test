document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  function ensureDashboardMobileCss() {
    if (document.getElementById('sobhaMobileCss')) return;
    var link = document.createElement('link');
    link.id = 'sobhaMobileCss';
    link.rel = 'stylesheet';
    link.href = '/js/dashboard-mobile.css?v=1';
    (document.head || document.documentElement).appendChild(link);

  const seenBundleErrors = new Set();

  function isKnownNullDocumentError(msg) {
    var text = String(msg || '');
    // Chrome: Cannot read properties of null (reading 'document')
    // Safari: null is not an object (evaluating 'a.contentWindow.document')
    // Both come from Cloudflare's injected challenge iframe probing contentWindow.
    return (
      text.includes("Cannot read properties of null (reading 'document')") ||
      text.includes('contentWindow.document') ||
      text.includes("null is not an object (evaluating 'a.contentWindow") ||
      text.includes("null is not an object (evaluating 'a.contentDocument")
    );
  }

  function dismissBundleErrorBanner() {
    var d = document.getElementById('__bundler_err');
    if (d && d.parentNode) {
      try { d.parentNode.removeChild(d); } catch (e) {}
    }
  }

  // Prevent noisy external/frame runtime errors from breaking interaction flows.
  window.addEventListener('error', function(e) {
    const msg = e && (e.message || e.type);
    if (!isKnownNullDocumentError(msg)) return;
    dismissBundleErrorBanner();
    if (e && typeof e.preventDefault === 'function') e.preventDefault();
    if (e && typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
  }, true);

  window.onerror = function(message) {
    if (!isKnownNullDocumentError(message)) return false;
    dismissBundleErrorBanner();
    return true;
  };

  function loadSsoLoginScript() {
    if (window.sobhaInitMicrosoftSSO) {
      window.sobhaInitMicrosoftSSO();
      return;
    }
    if (document.getElementById('sobhaSsoLoginScript')) return;

    const script = document.createElement('script');
    script.id = 'sobhaSsoLoginScript';
    script.src = '/js/sso-login.js';
    script.onload = function() {
      if (window.sobhaInitMicrosoftSSO) window.sobhaInitMicrosoftSSO();
    };
    document.head.appendChild(script);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    const message = String(e && (e.message || e.type) || 'Unknown error');
    // Ignore noisy third-party/runtime null-document error shown repeatedly in production.
    if (isKnownNullDocumentError(message)) {
      dismissBundleErrorBanner();
      return;
    }

    const key = message + '|' + (e && e.filename ? e.filename : '') + '|' + (e && e.lineno ? e.lineno : 0);
    if (seenBundleErrors.has(key)) return;
    seenBundleErrors.add(key);

    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + message +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    let template = JSON.parse(templateEl.textContent);

    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');

      } catch (err) {

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    // Strip stray quotes around UUIDs (broken re-serialized templates produce src="%22uuid%22").
    template = template.replace(
      /src=(["'])(?:"|'|&quot;|%22)?([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(?:"|'|&quot;|%22)?\1/gi,
      'src=$1$2$1'
    );

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    // Cover the newly swapped UI immediately so login/dashboard never flashes.
    // window globals survive replaceWith; only the DOM was replaced.
    try {
      var hasToken = false;
      var hasLoginError = false;
      try { hasToken = !!sessionStorage.getItem('sobha_token'); } catch (e) {}
      try {
        hasLoginError = !!(
          (typeof window.sobhaHasPendingLoginError === 'function' && window.sobhaHasPendingLoginError()) ||
          new URLSearchParams(window.location.search || '').get('login_error') ||
          sessionStorage.getItem('sobha_login_error')
        );
      } catch (e) {}
      if (hasLoginError) {
        document.documentElement.classList.add('sobha-login-error');
        if (typeof window.sobhaHideBootOverlay === 'function') window.sobhaHideBootOverlay();
      } else if (typeof window.sobhaShowBootOverlay === 'function') {
        if (hasToken) {
          window.sobhaShowBootOverlay('Fetching the latest sales performance report');
        } else {
          window.sobhaShowBootOverlay('Preparing your workspace', 'prepare');
        }
      }
    } catch (e) {}
    ensureDashboardMobileCss();
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) {
        let val = a.value;
        if (a.name === 'src' && val) {
          val = val.replace(/^["'%]+|["'%]+$/g, '');
        }
        s.setAttribute(a.name, val);
      }
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }

    // Safety net: keep splash covering UI until hooks decide login vs data load.
    // Skip prepare splash when PIN login already failed (?login_error=...).
    if (window.sobhaShowBootOverlay) {
      try {
        var loginFailed = false;
        try {
          loginFailed = !!(
            (typeof window.sobhaHasPendingLoginError === 'function' && window.sobhaHasPendingLoginError()) ||
            new URLSearchParams(window.location.search || '').get('login_error') ||
            sessionStorage.getItem('sobha_login_error')
          );
        } catch (e) {}
        if (loginFailed) {
          document.documentElement.classList.add('sobha-login-error');
          if (typeof window.sobhaHideBootOverlay === 'function') window.sobhaHideBootOverlay();
        } else if (sessionStorage.getItem('sobha_token')) {
          window.sobhaShowBootOverlay('Fetching the latest sales performance report');
        } else {
          window.sobhaShowBootOverlay('Preparing your workspace', 'prepare');
        }
      } catch (e) {}
    }

    ensureDashboardMobileCss();
    if (window.sobhaInstallDashboardHooks) window.sobhaInstallDashboardHooks();

    loadSsoLoginScript();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"9cf0ea0d-0b54-4a16-8cc1-6808b272feec\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n  <style>:root {\n    --bg: #f8f6f1;\n    --bg-2: #fdfcf9;\n    --panel: #ffffff;\n    --panel-2: #fbf9f4;\n    --border: #e8e3d7;\n    --border-strong: #d4cdb8;\n    --text: #1a1814;\n    --text-2: #4a4438;\n    --muted: #8a8170;\n    --gold: #b08a4e;\n    --gold-dark: #8a6938;\n    --gold-light: #d4b07a;\n    --gold-bg: #f5ecd9;\n    --black: #0d0c0a;\n    --good: #2d7a4f;\n    --good-light: #c8e3d2;\n    --bad: #b53a3a;\n    --bad-light: #f1cfcf;\n    --warn: #b8852b;\n    --warn-light: #f4e2bc;\n    --blue: #4a6fa5;\n    --shadow-sm: 0 1px 2px rgba(20,16,8,0.04), 0 1px 3px rgba(20,16,8,0.04);\n    --shadow-md: 0 4px 12px rgba(20,16,8,0.06), 0 2px 4px rgba(20,16,8,0.04);\n    --shadow-lg: 0 12px 32px rgba(20,16,8,0.08), 0 4px 12px rgba(20,16,8,0.04);\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body { font-family: Calibri, 'Trebuchet MS', sans-serif; }\n  body { background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }\n\n  /* LOGIN */\n  .login-wrap {\n    min-height: 100vh; display: grid; place-items: center; padding: 24px;\n    background:\n      radial-gradient(ellipse 800px 400px at 20% -10%, rgba(176,138,78,0.10), transparent 50%),\n      radial-gradient(ellipse 600px 400px at 80% 110%, rgba(176,138,78,0.06), transparent 50%),\n      var(--bg);\n  }\n  .login-card {\n    background: var(--panel); border: 1px solid var(--border); border-radius: 4px;\n    padding: 48px 44px; width: 100%; max-width: 440px;\n    box-shadow: var(--shadow-lg); position: relative;\n  }\n  .login-card::before { content:\"\"; position: absolute; top:0;left:0;right:0; height: 3px;\n    background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-dark)); }\n  .login-brand { text-align: center; margin-bottom: 32px; }\n  .login-brand img { height: 64px; background: var(--black); padding: 16px 24px; border-radius: 3px; margin-bottom: 16px; }\n  .login-sub { color: var(--muted); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; font-weight: 600; margin-top: 4px; }\n  .login-card label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; margin-top: 20px; font-weight: 700; }\n  .login-card input {\n    width: 100%; background: var(--bg-2); border: 1px solid var(--border); border-radius: 3px;\n    padding: 12px 14px; color: var(--text); font-size: 15px; font-family: inherit; transition: all 0.2s;\n  }\n  .login-card input:focus { outline: none; border-color: var(--gold); background: var(--panel); box-shadow: 0 0 0 3px rgba(176,138,78,0.12); }\n  .btn-login {\n    width: 100%; margin-top: 32px; padding: 14px;\n    background: var(--black); color: var(--gold); border: 1px solid var(--black); border-radius: 3px;\n    font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: 3px; text-transform: uppercase;\n    transition: all 0.2s; font-family: inherit;\n  }\n  .btn-sso { width: 100%; margin-top: 12px; padding: 14px; background: #f3f6fb; color: #1a1814; border: 1px solid #d4cdb8; border-radius: 3px; font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s; font-family: inherit; }\n  .btn-sso:hover { border-color: #b08a4e; background: #fff; }\n  .btn-sso:disabled { opacity: 0.7; cursor: not-allowed; }\n  .btn-login:hover { background: #1f1c16; box-shadow: 0 6px 16px rgba(176,138,78,0.25); }\n  .err { margin-top: 16px; padding: 11px 14px; background: var(--bad-light); border: 1px solid #e3a8a8;\n    border-radius: 3px; color: #7a2929; font-size: 12px; text-align: center; display: none; }\n  .err.show { display: block; }\n\n  /* APP */\n  .app { all { height: 440px; }\n\n  /* VP BREAKDOWN */\n  .vp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 28px; }\n  .vp-tile {\n    background: var(--panel); border: 1px solid var(--border); border-radius: 4px;\n    overflow: hidden; box-shadow: var(--shadow-sm); transition: all 0.2s; display: flex; flex-direction: column;\n  }\n  .vp-tile:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }\n  .vp-tile-head {\n    background: linear-gradient(135deg, #1a1814 0%, #2a251c 100%);\n    padding: 14px 18px; border-bottom: 2px solid var(--gold);\n  }\n  .vp-tile-name { color: #fff; font-size: 15px; font-weight: 700; margin-bottom: 2px; }\n  .vp-tile-region { color: var(--gold-light); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }\n  .vp-role-pills { display: flex; gap: 4px; padding: 10px 14px 4px; flex-wrap: wrap; background: linear-gradient(180deg, rgba(26,24,20,0.04), transparent); border-bottom: 1px dashed var(--border); }\n  .vp-role-pill { background: var(--bg-2); border: 1px solid var(--border); color: var(--text-2); padding: 4px 9px; border-radius: 3px; font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; text-transform: uppercase; transition: all 0.15s; }\n  .vp-role-pill:hover { border-color: var(--gold-light); color: var(--text); }\n  .vp-role-pill.active { background: var(--black); color: var(--gold); border-color: var(--black); }\n  .vp-tile-headline { background: var(--gold-bg); padding: 14px 18px; border-bottom: 1px solid var(--border); }\n  .vp-headline-label { color: var(--gold-dark); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }\n  .vp-headline-val { font-size: 24px; color: var(--text); font-weight: 700; letter-spacing: -0.3px; }\n  .vp-headline-val .u { font-size: 11px; color: var(--muted); margin-left: 6px; font-weight: 600; }\n  .vp-tile-stats { padding: 12px 18px; flex: 1; }\n  .vp-stat-row {\n    display: grid; grid-template-columns: 1fr auto; align-items: center;\n    padding: 7px 0; font-size: 12px; border-bottom: 1px dashed var(--border);\n  }\n  .vp-stat-row:last-child { border-bottom: none; }\n  .vp-stat-row .lbl { color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; font-size: 10px; }\n  .vp-stat-row .val { font-size: 14px; font-weight: 700; color: var(--text); text-align: right; }\n  .vp-stat-row .val.good { color: var(--good); }\n  .vp-stat-row .val.bad { color: var(--bad); }\n  .vp-stat-row .val .pct { font-size: 11px; color: var(--muted); font-weight: 600; margin-left: 4px; }\n  .vp-tile-footer { background: var(--bg-2); padding: 10px 18px; border-top: 1px solid var(--border); }\n  .vp-sd-select {\n    width: 100%; padding: 7px 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 3px;\n    font-family: inherit; font-size: 12px; color: var(--text); cursor: pointer;\n  }\n  .vp-sd-select:focus { outline: none; border-color: var(--gold); }\n\n  /* TABLES */\n  .tbl-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; box-shadow: var(--shadow-sm); overflow: hidden; }\n  .tbl-scroll { max-height: 540px; overflow: auto; -webkit-overflow-scrolling: touch; }\n  @media (max-width: 768px) {\n    .tbl-wrap { overflow: visible; border-radius: 4px; }\n    .tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }\n  }\n  .tbl-scroll::-webkit-scrollbar { width: 10px; height: 10px; }\n  .tbl-scroll::-webkit-scrollbar-track { background: var(--bg-2); }\n  .tbl-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; }\n  table { width: 100%; border-collapse: collapse; font-size: 13px; }\n  thead tr.header-row th {\n    text-align: left; color: var(--text); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;\n    font-size: 11px; padding: 12px 12px 8px 12px; background: var(--bg-2); position: sticky; top: 0;\n    z-index: 2; border-bottom: 1px solid var(--border); white-space: nowrap;\n  }\n  thead tr.filter-row th { background: var(--bg-2); padding: 0 8px 10px 8px; position: sticky; top: 38px; z-index: 2; border-bottom: 1px solid var(--border-strong); }\n  thead tr.filter-row input, thead tr.filter-row select {\n    width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text);\n    padding: 5px 8px; border-radius: 3px; font-family: inherit; font-size: 11px; min-width: 70px;\n  }\n  thead tr.filter-row input:focus, thead tr.filter-row select:focus { outline: none; border-color: var(--gold); }\n  td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); white-space: nowrap; }\n  tbody tr:last-child td { border-bottom: none; }\n  tbody tr:hover td { background: var(--gold-bg); }\n  td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }\n  td.name { font-weight: 700; color: var(--text); }\n  td .tag { display: inline-block; padding: 3px 9px; border-radius: 3px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }\n  .tag-q { background: var(--good-light); color: var(--good); }\n  .tag-n { background: var(--warn-light); color: var(--warn); }\n  .tag-c { background: var(--bad-light); color: var(--bad); }\n  .rank { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center;\n    border-radius: 50%; background: var(--bg-2); border: 1px solid var(--border); font-size: 11px; font-weight: 700; color: var(--text-2); }\n  .rank.top { background: var(--gold-bg); border-color: var(--gold-light); color: var(--gold-dark); }\n  .empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 13px; font-style: italic; }\n  .tbl-footer { background: var(--bg-2); padding: 10px 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }\n  .tbl-footer strong { color: var(--text); font-weight: 700; }\n\n  /* ROLE BADGES */\n  .role-badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; margin-left: 6px; vertical-align: middle; }\n  .role-sm  { background: rgba(176,138,78,0.15); color: var(--gold-dark); }\n  .role-sd  { background: rgba(74,111,165,0.15); color: var(--blue); }\n  .role-vp  { background: rgba(45,122,79,0.15); color: var(--good); }\n  .role-cso { background: rgba(181,58,58,0.15); color: var(--bad); }\n\n  /* \u2500\u2500 Scrollable table wrapper \u2500\u2500 */\n  .table-scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 4px; }\n  .table-scroll-wrap table { min-width: 600px; }\n\n  /* \u2500\u2500 Mobile filter toggle button \u2500\u2500 */\n  .ctrl-toggle-btn {\n    display: none; align-items: center; gap: 8px;\n    padding: 10px 18px; background: var(--black); color: var(--gold);\n    border: 1px solid var(--gold); border-radius: 4px; font-family: inherit;\n    font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 0.3px;\n  }\n  .ctrl-toggle-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }\n  /* Desktop: always show collapsible regardless of .collapsed class */\n  .ctrl-collapsible { display: flex !important; flex-wrap: wrap; gap: 28px; align-items: flex-end; }\n\n  @media (max-width: 1200px) {\n    .kpi-grid, .kpi-grid.with-pns { grid-template-columns: repeat(2, 1fr); }\n    .grid-12, .grid-11 { grid-template-columns: 1fr; }\n  }\n\n  @media (max-width: 768px) {\n    /* Header */\n    .header { padding: 10px 16px; }\n    .header-logo img { height: 28px; }\n    .header-meta { font-size: 11px; gap: 10px; }\n\n    /* Controls \u2014 collapsible panel */\n    .controls { padding: 0 16px; }\n    .ctrl-toggle-btn { display: flex; width: 100%; margin: 12px 0; }\n    .ctrl-collapsible { padding: 0 0 14px 0; display: flex !important; flex-wrap: wrap; gap: 16px; align-items: flex-end; }\n    .ctrl-collapsible.collapsed { display: none !important; }\n    .ctrl-group label { font-size: 10px; }\n    .ctrl-group input[type=date], .ctrl-group select { font-size: 12px; padding: 8px 10px; min-width: 0; width: 100%; }\n    .quick-dates { flex-wrap: wrap; gap: 6px; }\n    .quick-dates .pill { font-size: 10px; padding: 6px 10px; }\n\n    /* Main */\n    .main { padding: 18px 16px 40px; }\n    .section-title { font-size: 18px; }\n    .section-header { margin-bottom: 10px; }\n\n    /* KPIs */\n    .kpi-grid, .kpi-grid.with-pns { grid-template-columns: repeat(2, 1fr); gap: 10px; }\n    .kpi-card { padding: 14px; }\n    .kpi-val { font-size: 22px; }\n    .kpi-label { font-size: 10px; }\n\n    /* VP grid \u2014 1 column */\n    .vp-grid { grid-template-columns: 1fr; gap: 10px; }\n\n    /* Leaderboard table */\n    .lb-bar { display: none; }\n\n    /* Org chart */\n    .org-row-name { font-size: 12px; }\n    .org-row-role { font-size: 9px; padding: 1px 5px; }\n    .mapping-search, .mapping-tab-search input { min-width: 0; width: 100%; }\n    .mapping-toolbar { flex-direction: column; align-items: stretch; }\n    .mapping-actions { justify-content: flex-end; }\n  }\n\n  @media (max-width: 480px) {\n    /* Header \u2014 minimal */\n    .header-meta { display: none; }\n    .header-actions { gap: 8px; }\n\n    /* KPIs \u2014 1 column on very small */\n    .kpi-grid, .kpi-grid.with-pns { grid-template-columns: 1fr; }\n\n    /* Home screen */\n    .home-topbar { padding: 14px 16px; }\n    .home-body { padding: 24px 16px; }\n    .home-greeting h1 { font-size: 26px; }\n    .app-grid { grid-template-columns: 1fr; gap: 14px; }\n    .app-tile { padding: 20px 18px; }\n\n    /* Login */\n    .login-card { padding: 32px 24px; margin: 0 16px; }\n\n    /* Section cards */\n    .section-card { padding: 16px 14px; }\n\n    /* Hide less-important table columns on very small screens */\n    .hide-xs { display: none !important; }\n\n    /* Org chart compact */\n    .org-cso-head { padding: 10px 12px; }\n    .org-cso-nm { font-size: 13px; }\n    .org-cso-lbl { font-size: 9px; }\n  }<\u002Fstyle>\n  <script src=\"8bd7d7ab-84ec-4968-90ce-4564b8346759\"><\u002Fscript>\n  <script src=\"a94b57e9-3dea-4cd0-b29f-9b2df2209b3e\"><\u002Fscript>\n  <script src=\"d3e79d60-2177-4310-b45c-423fabe9fc69\"><\u002Fscript>\n  <script src=\"7bb38a80-0196-4a36-9c93-645c363a0284\"><\u002Fscript>\n  <script src=\"6a8b9392-8226-4985-a86f-47ff67d86a0a\"><\u002Fscript>\n<\u002Fhelmet>\n\n<!-- LOGIN -->\n<div class=\"login-wrap\" id=\"loginWrap\">\n  <div class=\"login-card\">\n    <div class=\"login-brand\">\n      <img src=\"89619989-dec8-49af-b5b4-46bc573cc744\" alt=\"Sobha Realty\">\n      <div class=\"login-sub\">Sales Performance Dashboard<\u002Fdiv>\n    <\u002Fdiv>\n    <label>Username<\u002Flabel>\n    <input type=\"text\" id=\"loginUser\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\">\n    <label>PIN<\u002Flabel>\n    <input type=\"password\" id=\"loginPin\" inputmode=\"numeric\" maxlength=\"6\">\n        <button type=\"button\" id=\"microsoftSSOBtn\" class=\"btn-sso\" data-microsoft-sso=\"1\">Sign in with Microsoft<\u002Fbutton>\n    <button class=\"btn-login\">Sign In<\u002Fbutton>\n    <div class=\"err\" id=\"loginErr\">Invalid username or PIN<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- HOME LAUNCHER -->\n<div class=\"home\" id=\"home\">\n  <div class=\"home-topbar\">\n    <div class=\"home-logo\"><img id=\"homeLogoImg\" src=\"89619989-dec8-49af-b5b4-46bc573cc744\" alt=\"Sobha Realty\"><\u002Fdiv>\n    <div class=\"home-topbar-right\">\n      <div class=\"home-user\">\n        <div class=\"home-user-name\" id=\"homeUserName\"><\u002Fdiv>\n        <div class=\"home-user-role\" id=\"homeUserRole\"><\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn-logout\">Logout<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"home-body\">\n    <div class=\"home-greeting\">\n      <div class=\"eyebrow\">Sobha Realty<\u002Fdiv>\n      <h1>Welcome, <span class=\"accent\" id=\"homeGreetName\">there<\u002Fspan><\u002Fh1>\n      <p>Choose an application to get started.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"app-grid\" id=\"appGrid\">\n      <div class=\"app-tile\">\n        <div class=\"tile-icon\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"1.6\"><path d=\"M3 3v18h18\"><\u002Fpath><rect x=\"7\" y=\"12\" width=\"3\" height=\"6\"><\u002Frect><rect x=\"12\" y=\"8\" width=\"3\" height=\"10\"><\u002Frect><rect x=\"17\" y=\"4\" width=\"3\" height=\"14\"><\u002Frect><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Sales Performance<\u002Fh3>\n        <p>Bookings, KPIs, VP &amp; team leaderboards, broker analytics and the live SBTR.<\u002Fp>\n        <span class=\"tile-cta\">Open \u2192<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"app-tile\">\n        <div class=\"tile-icon\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"1.6\"><circle cx=\"12\" cy=\"5\" r=\"2.5\"><\u002Fcircle><circle cx=\"5\" cy=\"18\" r=\"2.5\"><\u002Fcircle><circle cx=\"19\" cy=\"18\" r=\"2.5\"><\u002Fcircle><path d=\"M12 7.5v4M12 11.5H5.5v4M12 11.5h6.5v4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Sales Team Mapping<\u002Fh3>\n        <p>Upload and browse the current sales-team hierarchy and reporting structure.<\u002Fp>\n        <span class=\"tile-cta\">Open \u2192<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"app-tile soon\">\n        <span class=\"soon-badge\">Coming soon<\u002Fspan>\n        <div class=\"tile-icon\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"1.6\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>More to come<\u002Fh3>\n        <p>Additional tools and reports will appear here.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- DASHBOARD -->\n<div class=\"app\" id=\"app\">\n  <div class=\"header\">\n    <div class=\"header-left\">\n      <div class=\"header-logo\"><img src=\"89619989-dec8-49af-b5b4-46bc573cc744\" alt=\"Sobha\"><\u002Fdiv>\n      <div class=\"header-divider\"><\u002Fdiv>\n      <div class=\"header-meta\">SBTR as of <strong id=\"dataAsOf\">—<\u002Fstrong><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"header-right\">\n      <div class=\"user-chip\">\n        <div class=\"user-name\" id=\"userName\"><\u002Fdiv>\n        <div class=\"user-role\" id=\"userRole\"><\u002Fdiv>\n      <\u002Fdiv>\n      <input type=\"file\" id=\"sbtrFile\" accept=\".xlsx\" style=\"display:none;\">\n      <button class=\"btn-home\" title=\"Back to apps\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2\"><path d=\"M3 11l9-8 9 8M5 9v11h5v-6h4v6h5V9\"><\u002Fpath><\u002Fsvg>\n        Apps\n      <\u002Fbutton>\n      <button class=\"btn-upload\" id=\"btnUpload\" style=\"display:none;\" title=\"Replace dashboard data with a freshly downloaded SBTR Excel\">\u2191 Upload SBTR<\u002Fbutton>\n      <button class=\"btn-logout\">Logout<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"controls\" id=\"controlsBar\">\n    <button class=\"ctrl-toggle-btn\" id=\"ctrlToggle\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2\"><line x1=\"4\" y1=\"6\" x2=\"20\" y2=\"6\"><\u002Fline><line x1=\"4\" y1=\"12\" x2=\"16\" y2=\"12\"><\u002Fline><line x1=\"4\" y1=\"18\" x2=\"12\" y2=\"18\"><\u002Fline><\u002Fsvg>\n      Filters &amp; Date Range\n    <\u002Fbutton>\n    <div class=\"ctrl-collapsible collapsed\" id=\"ctrlCollapsible\" style=\"flex-wrap:wrap;gap:28px;align-items:flex-end;\">\n      <div class=\"ctrl-group\">\n        <div class=\"ctrl-label\">Region<\u002Fdiv>\n        <div class=\"pills\" id=\"locPills\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ctrl-group\">\n        <div class=\"ctrl-label\">From<\u002Fdiv>\n        <input type=\"date\" id=\"dateFrom\">\n      <\u002Fdiv>\n      <div class=\"ctrl-group\">\n        <div class=\"ctrl-label\">To<\u002Fdiv>\n        <input type=\"date\" id=\"dateTo\">\n      <\u002Fdiv>\n      <div class=\"ctrl-group\">\n        <div class=\"ctrl-label\">Quick Range<\u002Fdiv>\n        <div class=\"quick-dates pills\">\n          <div class=\"pill\">YTD<\u002Fdiv>\n          <div class=\"pill\">MTD<\u002Fdiv>\n          <div class=\"pill\">30D<\u002Fdiv>\n          <div class=\"pill\">90D<\u002Fdiv>\n          <div class=\"pill active\">All<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ctrl-group\" id=\"viewAsGroup\" style=\"display:none;\">\n        <div class=\"ctrl-label\">View Footprint Of<\u002Fdiv>\n        <select id=\"viewAsSelect\"><\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"main\">\n    <div id=\"footprintNote\" class=\"info-note\" style=\"display:none;\">\n      <div class=\"info-icon\">i<\u002Fdiv>\n      <div style=\"flex:1;\">\n        <div id=\"footprintNoteText\"><\u002Fdiv>\n        <div id=\"personalRoleBar\" style=\"display:none;margin-top:12px;align-items:center;gap:12px;flex-wrap:wrap;\">\n          <div style=\"display:inline-flex;background:rgba(255,255,255,0.6);border:1px solid var(--gold-light);border-radius:4px;padding:6px 10px;gap:6px;align-items:center;flex-wrap:wrap;\">\n            <span style=\"color:var(--gold-dark);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-right:6px;\">View Role<\u002Fspan>\n            <span id=\"personalRolePills\"><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section-header\">\n      <div class=\"section-title\">Performance Overview<\u002Fdiv>\n      <div class=\"section-meta\" id=\"overviewMeta\">All Regions<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"kpi-grid\" id=\"kpiGrid\"><\u002Fdiv>\n    <div class=\"logic-note\" id=\"kpiLogicNote\"><\u002Fdiv>\n\n    <!-- Breakdown status ills\" id=\"sdViewToggle\">\n          <div class=\"pill active\" data-sdview=\"vp\">VP-wise<\u002Fdiv>\n          <div class=\"pill\" data-sdview=\"flat\">Highest \u2192 Lowest<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tbl-wrap\">\n        <div class=\"tbl-scroll\" style=\"max-height:600px;\">\n          <table id=\"sdTable\">\n            <thead><tr class=\"header-row\" id=\"sdHeaderRow\"><\u002Ftr><\u002Fthead>\n            <tbody id=\"sdBody\"><\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <div class=\"tbl-footer\">\n          <div id=\"sdFooterLeft\">0 Sales Directors<\u002Fdiv>\n          <div id=\"sdFooterRight\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"logic-note\"><em><strong>Grouping:<\u002Fstrong> Each SD is shown under their primary VP as derived from the SBTR team hierarchy. Numbers count bookings where their name appears in the Sales Director role column \u2014 consistent with the VP breakdown above. Respects all active date and region filters.<\u002Fem><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SM Breakdown (VP view) -->\n    <div id=\"smBreakdownBlock\" style=\"display:none;\">\n      <div class=\"section-header\">\n        <div class=\"section-title\">Sales Manager Performance<\u002Fdiv>\n        <div class=\"section-meta\" id=\"smBreakdownMeta\">Grouped by SD \u00b7 Current mapping<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;\">\n        <div id=\"smSdFilter\"><\u002Fdiv>\n        <div class=\"pills\" id=\"smViewToggle\">\n          <div class=\"pill active\" data-smview=\"sd\">SD-wise<\u002Fdiv>\n          <div class=\"pill\" data-smview=\"flat\">Highest \u2192 Lowest<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tbl-wrap\">\n        <div class=\"tbl-scroll\" style=\"max-height:600px;\">\n          <table id=\"smTable\">\n            <thead><tr class=\"header-row\" id=\"smHeaderRow\"><\u002Ftr><\u002Fthead>\n            <tbody id=\"smBody\"><\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <div class=\"tbl-footer\">\n          <div id=\"smFooterLeft\">0 Sales Managers<\u002Fdiv>\n          <div id=\"smFooterRight\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"logic-note\"><em><strong>Attribution:<\u002Fstrong> Each SM row counts bookings where their name appears in the Sales Manager role column (Attended by). Grouped under their current Sales Director from the mapping file. Respects active date, region, and status filters.<\u002Fem><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"sevenDayBlock\" style=\"display:none;\">\n      <div class=\"section-header\">\n        <div class=\"section-title\">PNS \u2014 Last 7 Working Days<\u002Fdiv>\n        <div class=\"section-meta\" id=\"sevenDayMeta\">Day by day, VP &amp; SD<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tbl-wrap\">\n        <div class=\"tbl-scroll\" style=\"max-height:540px;\">\n          <table id=\"sevenDayTable\">\n            <thead><tr class=\"header-row\" id=\"sevenDayHeader\"><\u002Ftr><\u002Fthead>\n            <tbody id=\"sevenDayBody\"><\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <div class=\"tbl-footer\">\n          <div><em>Last 7 working days (Mon\u2013Fri) ending at the latest booking date. Grouped by CSO. <strong>Daily columns show each CSO's home-region PNS.<\u002Fstrong> SD PNS rolls up into its VP. All values in Mn AED. Click \u25b8 to expand a VP. Respects the Region filter.<\u002Fem><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section-header\">\n      <div class=\"section-title\">Booking Trend<\u002Fdiv>\n      <div class=\"section-meta\">Monthly \u00b7 By status<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"grid-12\">\n      <div class=\"card\">\n        <div class=\"card-title\">Monthly Sale Value <span class=\"badge\">AED Mn<\u002Fspan><\u002Fdiv>\n        <div class=\"card-subtitle\">Qualified / Not Qualified / Cancelled<\u002Fdiv>\n        <div class=\"chart-host xtall\"><canvas id=\"trendChart\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-title\">Region Split<\u002Fdiv>\n        <div class=\"card-subtitle\">Share of total declaration<\u002Fdiv>\n        <div class=\"chart-host xtall\"><canvas id=\"regionChart\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"logic-note\"><em><strong>Booking Trend<\u002Fstrong> bars stack each month by booking status. <strong>Region<\u002Fstrong> is derived from project: Sobha Siniya Island &amp; Downtown UAQ \u2192 UAQ; Sobha City \u2192 Abu Dhabi; everything else \u2192 Dubai.<\u002Fem><\u002Fdiv>\n\n    <div class=\"grid-11\">\n      <div class=\"card\">\n        <div class=\"card-title\" id=\"teamTitle\">Team Performance<\u002Fdiv>\n        <div class=\"card-subtitle\">Sale Value by group, stacked by status<\u002Fdiv>\n        <div class=\"chart-host tall\"><canvas id=\"teamChart\" data-comment-anchor=\"1d893bb6c8-canvas\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-title\">Project Mix<\u002Fdiv>\n        <div class=\"card-subtitle\">Top 10 by Sale Value<\u002Fdiv>\n        <div class=\"chart-host tall\"><canvas id=\"projectChart\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section-header\" style=\"margin-top:8px;\">\n      <div class=\"section-title\" id=\"lbTitle\">Leaderboard<\u002Fdiv>\n      <div class=\"section-meta\">Ranked by Sale Value<\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"lbRolePillsWrap\" style=\"display:none;margin:-4px 0 14px;\">\n      <div class=\"vp-role-pills\" style=\"display:inline-flex;background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:8px 12px;gap:6px;\">\n        <span style=\"color:var(--muted);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;align-self:center;margin-right:6px;\">View<\u002Fspan>\n        <span id=\"lbRolePills\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tbl-wrap\">\n      <div class=\"tbl-scroll\">\n        <table id=\"leaderboardTable\">\n          <thead><tr class=\"header-row\" id=\"lbHeaderRow\"><\u002Ftr><\u002Fthead>\n          <tbody id=\"lbBody\"><\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"logic-note\" id=\"lbLogicNote\"><\u002Fdiv>\n\n    <div id=\"brokerBlock\" style=\"display:none;\">\n      <div class=\"section-header\" style=\"margin-top:24px;\">\n        <div class=\"section-title\">Broker Leaderboard<\u002Fdiv>\n        <div class=\"section-meta\" id=\"brokerMeta\">Ranked by Full Sale Value \u00b7 in your footprint<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tbl-wrap\">\n        <div class=\"tbl-scroll\" style=\"max-height:520px;\">\n          <table id=\"brokerTable\">\n            <thead><tr class=\"header-row\" id=\"brokerHeaderRow\"><\u002Ftr><\u002Fthead>\n            <tbody id=\"brokerBody\"><\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <div class=\"tbl-footer\">\n          <div><em>Brokers ranked by Full Sale Value within the records you can see. Qual % and Canc % are share of that broker's own Sale Value. Direct bookings (no broker) are grouped as \"Direct\".<\u002Fem><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section-header\" style=\"margin-top:24px;\">\n      <div class=\"section-title\">Recent Bookings<\u002Fdiv>\n      <div class=\"section-meta\">Latest in selection \u00b7 Use filter row to search<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tbl-wrap\">\n      <div class=\"tbl-scroll\">\n        <table id=\"recentTable\">\n          <thead>\n            <tr class=\"header-row\" id=\"recentHeaderRow\"><\u002Ftr>\n            <tr class=\"filter-row\" id=\"recentFilterRow\"><\u002Ftr>\n          <\u002Fthead>\n          <tbody id=\"recentBody\"><\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n      <div class=\"tbl-footer\">\n        <div>Showing <strong id=\"recentShownCount\">0<\u002Fstrong> of <strong id=\"recentTotalCount\">0<\u002Fstrong> rows<\u002Fdiv>\n        <div><strong id=\"recentSumSV\">0<\u002Fstrong> Mn AED \u00b7 <strong id=\"recentSumUC\">0<\u002Fstrong> units<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- SALES TEAM MAPPING -->\n<div class=\"mapping-view\" id=\"mappingView\">\n  <div class=\"header\">\n    <div class=\"header-left\">\n      <div class=\"header-logo\"><img id=\"mappingLogoImg\" src=\"89619989-dec8-49af-b5b4-46bc573cc744\" alt=\"Sobha Realty\"><\u002Fdiv>\n      <div class=\"header-divider\"><\u002Fdiv>\n      <div class=\"header-meta\">Sales Team Mapping<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"header-right\">\n      <input type=\"file\" id=\"mappingFile\" accept=\".xlsx\" style=\"display:none;\">\n      <button class=\"btn-home\" title=\"Back to apps\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2\"><path d=\"M3 11l9-8 9 8M5 9v11h5v-6h4v6h5V9\"><\u002Fpath><\u002Fsvg>\n        Apps\n      <\u002Fbutton>\n      <button class=\"btn-logout\">Logout<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"mapping-body\">\n    <div class=\"mapping-tabs\" id=\"mappingTabs\">\n      <button class=\"mtab\" data-tab=\"me\">My Position<\u002Fbutton>\n      <button class=\"mtab\" data-tab=\"all\">Full Organisation<\u002Fbutton>\n      <button class=\"mtab\" data-tab=\"file\">Manage File<\u002Fbutton>\n      <div class=\"mapping-tab-search\">\n        <input type=\"text\" id=\"orgSearch\" placeholder=\"Find a person\u2026\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"orgPanel\">\n      <div class=\"org-legend\" id=\"orgLegend\"><\u002Fdiv>\n      <div class=\"org-scroll\"><div class=\"org-canvas\" id=\"orgCanvas\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"org-note\" id=\"orgNote\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"filePanel\" style=\"display:none;\">\n      <div id=\"mappingEmpty\">\n        <div class=\"mapping-drop\" id=\"mappingDrop\">\n          <div class=\"drop-icon\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"1.5\"><path d=\"M12 16V4M7 9l5-5 5 5\"><\u002Fpath><path d=\"M4 16v3a1 1 0 001 1h14a1 1 0 001-1v-3\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3>Upload a Sales Team Mapping file<\u002Fh3>\n          <p>Optional. Drag &amp; drop your <strong>.xlsx<\u002Fstrong> here, or <span class=\"browse\">browse<\u002Fspan> to select it.<br>The org chart above is built automatically from the live SBTR \u2014 this is for keeping a reference copy of an official mapping sheet.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"mappingLoaded\" style=\"display:none;\">\n        <div class=\"mapping-toolbar\">\n          <input type=\"text\" class=\"mapping-search\" id=\"mappingSearch\" placeholder=\"Search the mapping\u2026\">\n          <div class=\"mapping-actions\">\n            <button class=\"btn-upload\">\u2191 Replace File<\u002Fbutton>\n            <button class=\"btn-logout\" style=\"color:var(--bad);border-color:var(--bad);\">Clear<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tbl-wrap\">\n          <div class=\"tbl-scroll\" style=\"max-height:calc(100vh - 320px);\">\n            <table id=\"mappingTable\">\n              <thead><tr class=\"header-row\" id=\"mappingHeaderRow\"><\u002Ftr><\u002Fthead>\n              <tbody id=\"mappingBody\"><\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n          <div class=\"tbl-footer\">\n            <div><strong id=\"mappingMeta\">0 rows<\u002Fstrong><\u002Fdiv>\n            <div id=\"mappingFileName\" style=\"color:var(--muted);\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    // sobha-dash.js self-inits via its own polling loop.\n    // This is a fallback in case it loads before Chart.js or the payload.\n    const tryInit = () => {\n      if (window._sobhaReady) return; // already done by self-init\n      if (window.SOBHA_INIT && window.SOBHA_PAYLOAD && window.Chart) {\n        try { window.SOBHA_INIT(window.SOBHA_PAYLOAD); } catch(e) { console.error('SOBHA_INIT error:', e); }\n      } else {\n        setTimeout(tryInit, 80);\n      }\n    };\n    setTimeout(tryInit, 200); // slight delay to let self-init go first\n  }\n\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
